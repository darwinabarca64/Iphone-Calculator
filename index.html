<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora estilo iOS</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="calculator">

    <div class="display-container">
        <input class="display" type="text" id="display" value="0" disabled>

    </div>   
        <table>
            <tr>
                <td><button class="btn btn-light-gray" id="clearButton">AC</button></td>
                <td><button class="btn btn-light-gray">+/-</button></td>
                <td><button class="btn btn-light-gray">%</button></td>
                <td><button class="btn btn-orange">÷</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-dark-gray">7</button></td>
                <td><button class="btn btn-dark-gray">8</button></td>
                <td><button class="btn btn-dark-gray">9</button></td>
                <td><button class="btn btn-orange">X</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-dark-gray">4</button></td>
                <td><button class="btn btn-dark-gray">5</button></td>
                <td><button class="btn btn-dark-gray">6</button></td>
                <td><button class="btn btn-orange">-</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-dark-gray">1</button></td>
                <td><button class="btn btn-dark-gray">2</button></td>
                <td><button class="btn btn-dark-gray">3</button></td>
                <td><button class="btn btn-orange">+</button></td>
            </tr>
            <tr>
                <!-- Colspan 2 para que el 0 ocupe dos columnas -->
                <td colspan="2"><button class="btn btn-dark-gray btn-zero">0</button></td>
                <td><button class="btn btn-dark-gray">.</button></td>
                <td><button class="btn btn-orange">=</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-extra">x2</button></td>
                <td><button class="btn btn-extra">x3</button></td>
                <td><button class="btn btn-extra">PI</button></td>
                <td><button class="btn btn-extra">√</button></td>
            </tr>
        </table>
    </div>
</body>

</html>
