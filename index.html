<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <title>Calculadora estilo iOS</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <table>
        <tr>
            <td colspan="4"><input class="inputStyle" type="text" id="display" value="0" disabled></td>
        </tr>
        <tr>
            <td><button class="btn-light-gray" id="clearButton">AC</button></td>
            <td><button class="btn-light-gray">+/-</button></td>
            <td><button class="btn-light-gray">%</button></td>
            <td><button class="btn-orange">÷</button></td>
        </tr>
        <tr>
            <td><button class="btn-dark-gray">7</button></td>
            <td><button class="btn-dark-gray">8</button></td>
            <td><button class="btn-dark-gray">9</button></td>
            <td><button class="btn-orange">X</button></td>
        </tr>
        <tr>
            <td><button class="btn-dark-gray">4</button></td>
            <td><button class="btn-dark-gray">5</button></td>
            <td><button class="btn-dark-gray">6</button></td>
            <td><button class="btn-orange">-</button></td>
        </tr>
        <tr>
            <td><button class="btn-dark-gray">1</button></td>
            <td><button class="btn-dark-gray">2</button></td>
            <td><button class="btn-dark-gray">3</button></td>
            <td><button class="btn-orange">+</button></td>
        </tr>
        <tr>
            <!-- Colspan 2 para que el 0 ocupe dos columnas -->
            <td colspan="2"><button class="btn-dark-gray btn-zero">0</button></td>
            <td><button class="btn-dark-gray">.</button></td>
            <td><button class="btn-orange">=</button></td>
        </tr>
        <tr>
            <td><button class="btn-extra">x2</button></td>
            <td><button class="btn-extra">x3</button></td>
            <td><button class="btn-extra">PI</button></td>
            <td><button class="btn-extra">√</button></td>
        </tr>
    </table>
</body>
</html>
